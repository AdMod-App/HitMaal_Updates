<!DOCTYPE html>
<html>
<head>

<title>My App Download</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f1f3f4;
}

.header{
background:white;
padding:20px;
display:flex;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.icon{
width:80px;
border-radius:20px;
margin-right:15px;
}

.app-info h1{
margin:0;
font-size:22px;
}

.version{
color:#666;
font-size:14px;
}

.btn{
display:inline-block;
padding:12px 18px;
border-radius:6px;
text-decoration:none;
margin-top:10px;
margin-right:8px;
font-size:15px;
}

.download{
background:#1db954;
color:white;
}

.telegram{
background:#0088cc;
color:white;
}

.container{
padding:20px;
}

.section{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.screenshots{
display:flex;
overflow-x:auto;
gap:10px;
}

.screenshots img{
height:350px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<img src="icon.png" class="icon">

<div class="app-info">

<h1>My App</h1>

<div class="version">
Latest Version: <span id="version">Loading...</span>
</div>

<a class="btn download" id="downloadBtn">Download APK</a>

<a class="btn telegram" href="https://t.me/YOUR_CHANNEL">
Join Telegram
</a>

</div>

</div>

<div class="container">

<div class="section">

<h2>Screenshots</h2>

<div class="screenshots">
<img src="s1.jpg">
<img src="s2.jpg">
<img src="s3.jpg">
</div>

</div>

<div class="section">

<h2>What's New</h2>

<ul>
<li>New UI improvements</li>
<li>Bug fixes</li>
<li>Faster loading</li>
<li>Improved app update system</li>
</ul>

</div>

  <div class="section">

<h2>About this App</h2>

<p>
This app provides fast access to our platform with a clean interface and automatic updates.
</p>

  </div>

</div>

<script>

/* AUTO VERSION DETECTION */

fetch("version.json")
.then(response => response.json())
.then(data => {

document.getElementById("version").innerText = data.version;

document.getElementById("downloadBtn").href = data.apk;

});

</script>

</body>
</html>
