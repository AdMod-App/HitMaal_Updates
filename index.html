<!DOCTYPE html>
<html>
<head>
<title>My App</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Roboto,Arial;
background:#f1f3f4;
}

.header{
background:white;
padding:20px;
display:flex;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.icon{
width:80px;
border-radius:18px;
margin-right:15px;
}

.app-info h1{
margin:0;
font-size:22px;
}

.app-info p{
margin:3px 0;
color:#666;
}

.download{
background:#1db954;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:6px;
font-size:16px;
display:inline-block;
margin-top:10px;
}

.container{
padding:20px;
}

.section{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.screenshots{
display:flex;
overflow-x:auto;
gap:10px;
}

.screenshots img{
height:350px;
border-radius:10px;
}

.changelog ul{
padding-left:20px;
}

</style>

</head>

<body>

<div class="header">

<img src="icon.png" class="icon">

<div class="app-info">
<h1>My App Name</h1>
<p>Version 1.2 • 15 MB</p>

<a class="download" href="APK_LINK_HERE">
Download APK
</a>

</div>

</div>

<div class="container">

<div class="section">

<h2>Screenshots</h2>

<div class="screenshots">

<img src="s1.jpg">
<img src="s2.jpg">
<img src="s3.jpg">

</div>

</div>

<div class="section changelog">

<h2>What's New</h2>

<ul>
<li>New UI improvements</li>
<li>App update feature improved</li>
<li>Bug fixes</li>
<li>Performance improvements</li>
</ul>

</div>

<div class="section">

<h2>About this App</h2>

<p>
This app provides fast access to our platform with a clean interface and automatic updates.
</p>

</div>

</div>

</html>
