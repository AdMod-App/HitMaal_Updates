<!DOCTYPE html>
<html>
<head>
<title>App Download</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.header{
background:#1e88e5;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
margin-bottom:20px;
}

.app-icon{
width:90px;
border-radius:20px;
}

.download{
background:#28a745;
color:white;
padding:14px 24px;
display:inline-block;
text-decoration:none;
border-radius:8px;
font-size:18px;
margin-top:10px;
}

.screenshots img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.changelog{
text-align:left;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
Download My App
</div>

<div class="container">

<div class="card">

<img src="icon.png" class="app-icon">

<h2>My App Name</h2>

<p>Latest Version: 1.2</p>

<a class="download" href="https://github.com/USERNAME/REPO/releases/download/app.apk">
Download APK
</a>

</div>

<div class="card">

<h3>Screenshots</h3>

<div class="screenshots">
<img src="screenshot1.jpg">
<img src="screenshot2.jpg">
<img src="screenshot3.jpg">
</div>

</div>

<div class="card changelog">

<h3>What's New</h3>

<ul>
<li>New UI improvements</li>
<li>Bug fixes</li>
<li>Faster loading speed</li>
<li>Improved app updater</li>
</ul>

</div>

</div>

</body>
</html>
